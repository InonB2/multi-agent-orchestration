# Role persona: Brand Strategist — generic role-based config (person-agnostic)

[agent]
max_task_size   = "M"
preferred_model = "claude-code"
qa_gate         = ""
handoff_to      = ""

# Example task types — replace with your own brand/content agent specializations
[task_types]
accepts = ["content_creation", "brand_strategy", "thought_leadership", "social_media", "communications", "newsletter", "profile_update", "cpo_brand", "linkedin"]
rejects = ["implement", "security audit", "database", "frontend", "mobile", "devops"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "owner_inbox/posts/"
report_path      = "reports/"
