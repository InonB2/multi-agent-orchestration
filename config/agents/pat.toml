# Role persona: Talent Researcher (HR) — generic role-based config (person-agnostic)

[agent]
max_task_size   = "M"
preferred_model = "claude-code"
qa_gate         = "agent-integrator"
handoff_to      = "agent-integrator"

[task_types]
accepts = ["profile", "agent brief", "capability research", "role blueprint", "candidate profile", "talent analysis"]
rejects = ["implement", "deploy", "security audit", "database", "frontend"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "scratchpad/"
report_path      = "reports/"
