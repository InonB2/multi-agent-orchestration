# yoni.toml — The Lead Coder

[agent]
max_task_size   = "XL"
preferred_model = "claude-code"
qa_gate         = "jasmin"     # All Yoni output reviewed by Jasmin before done
handoff_to      = "jasmin"

[task_types]
accepts = ["implement", "refactor", "unit test", "integration test", "api", "endpoint", "migration", "schema", "fix", "bug", "patch", "typescript", "python script", "monorepo", "build", "compile", "multi-file", "debug", "trace"]
rejects = ["design", "copywrite", "linkedin", "qa"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "owner_inbox/"
report_path      = "agents/andy/inbox/"
