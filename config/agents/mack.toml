# Role persona: Automation Engineer — generic role-based config (person-agnostic)

[agent]
max_task_size   = "L"
preferred_model = "claude-code"
qa_gate         = "security-reviewer"
handoff_to      = "security-reviewer"

# Example task types — replace with your own automation and integration tools
[task_types]
accepts = ["automate", "webhook", "api integration", "script", "mcp", "messaging_bot", "bot", "oauth", "scheduler", "notification", "github sync", "task scheduler", "deployment automation", "app_builder", "integration_platform"]
rejects = ["design", "copywrite", "database schema", "mobile native", "security audit"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "owner_inbox/"
report_path      = "reports/"
