# Role persona: Security Auditor — generic role-based config (person-agnostic)

[agent]
max_task_size   = "L"
preferred_model = "claude-code"
qa_gate         = "security-reviewer"
handoff_to      = "security-reviewer"

[task_types]
accepts = ["owasp", "security audit", "header audit", "pii exposure", "cwe", "api surface audit", "pentest", "rate limit", "cors", "auth review"]
rejects = ["implement", "deploy", "design", "copywrite", "mobile"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "owner_inbox/"
report_path      = "reports/"
