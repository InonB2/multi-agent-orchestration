# claude-code.toml — Default CLI provider agent.
#
# task_router.py routes unmatched/default tasks to the "claude-code" provider
# and looks up this file for the enriched provider label. Without it the label
# silently falls back to the generic "[provider: cli]".

[agent]
name            = "claude-code"
description     = "Default orchestration provider — executes tasks via the Claude Code CLI"
max_task_size   = "XL"
preferred_model = "claude-code"
qa_gate         = ""
handoff_to      = ""

[provider]
# CLI tool invoked locally; no API key required.
type = "cli"

# [task_types] is descriptive metadata only — see _defaults.toml. The router
# does not read it; routing is keyword-based in scripts/task_router.py.
[task_types]
accepts = ["orchestrate", "delegate", "architect", "coordinate", "multi-file", "debug", "subagent", "workflow"]
rejects = []

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "owner_inbox/"
report_path      = "agents/orchestrator/inbox/"
