# Role persona: UI/UX Designer — generic role-based config (person-agnostic)

[agent]
max_task_size   = "L"
preferred_model = "claude-code"
qa_gate         = "qa-inspector"
handoff_to      = "web-developer"

[task_types]
accepts = ["design", "ui", "ux", "wireframe", "visual", "design brief", "design system", "color palette", "typography", "wcag", "layout", "mockup", "prototype"]
rejects = ["implement", "security audit", "database", "copywrite", "mobile code"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "owner_inbox/design/"
report_path      = "reports/"
