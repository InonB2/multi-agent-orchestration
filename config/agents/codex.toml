# codex.toml — Fallback Coder (OpenAI Codex CLI)
# Activated when Claude is rate-limited and coding tasks are queued.
# Adapt context loading to your project's equivalent handoff or context files (e.g., CLAUDE.md, AGENTS.md)
# QA gate: Jasmin

[agent]
max_task_size   = "M"
preferred_model = "codex"
qa_gate         = "jasmin"
handoff_to      = "jasmin"

[provider]
type = "cli"
# Codex MUST be run via its `exec` subcommand for non-interactive use. The bare
# `codex "<prompt>"` opens an interactive TUI that hangs in automation (no TTY),
# which looks like "codex stops working". `codex exec` runs headless with
# approvals disabled by default.
# Windows note: if the built-in sandbox fails to spawn child processes
# (error: "windows sandbox: spawn setup refresh"), append
# "--dangerously-bypass-approvals-and-sandbox" to this list for trusted repos.
cli_exec_args = ["exec"]

[task_types]
accepts = ["implement", "unit test", "pr review", "single file", "patch", "refactor", "fix", "typescript", "python script"]
rejects = ["multi-repo", "orchestrate", "design", "copywrite", "database schema", "security audit", "devops"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "owner_inbox/"
report_path      = "agents/andy/inbox/"
