# _defaults.toml — Base defaults for all agents.
# Per-agent TOML files override these values.
# Merge order: _defaults.toml < [agent].toml

[agent]
max_task_size   = "L"          # S, M, L, XL — max complexity this agent accepts
preferred_model = "claude-code"
qa_gate         = ""           # which agent does QA on this agent's output
handoff_to      = ""           # default handoff agent on rate limit

# NOTE: [task_types] is descriptive metadata only. The live router
# (scripts/task_router.py) routes by keyword scoring over its own hardcoded
# ROUTING_RULES lists and does NOT read these fields. Editing them documents
# an agent's intended specialisation but does not change routing behaviour.
[task_types]
accepts = []                   # task type keywords this agent specialises in
rejects = []                   # task types to never route here

[rate_limit]
notify_at_pct = 85             # write checkpoint when usage hits this %
resume_queue  = true           # add to resume queue on rate limit hit

[output]
deliverable_path = "owner_inbox/"
report_path      = "agents/andy/inbox/"

[provider]
# "cli" = invoke via a local CLI tool (Claude Code, Codex CLI, etc.)
# "api" = call an OpenAI-compatible or Anthropic REST endpoint directly
type = "cli"

# For type = "cli": extra arguments inserted BETWEEN the CLI command and the
# prompt, i.e. the process is run as: <cli_cmd> <cli_exec_args...> "<prompt>".
# This is REQUIRED for non-interactive execution of CLIs that open an
# interactive UI by default. The most important case is the OpenAI Codex CLI:
# running `codex "<prompt>"` launches an interactive TUI that HANGS in
# automation, so codex must be invoked as `codex exec "<prompt>"`.
# The runner always closes stdin (no TTY) so exec-style CLIs do not block
# waiting on input. Leave empty for CLIs that already run non-interactively.
cli_exec_args = []

# For type = "api": set these in your environment or per-agent override
# api_base_url = "https://api.openai.com/v1"   # any OpenAI-compatible base URL
# api_key_env_var = "OPENAI_API_KEY"            # env var holding the API key
# model_id = "gpt-4o"                            # model to use
