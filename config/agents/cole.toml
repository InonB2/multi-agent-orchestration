# Role persona: Copywriter — generic role-based config (person-agnostic)

[agent]
max_task_size   = "L"
preferred_model = "claude-code"
qa_gate         = "security-reviewer"
handoff_to      = "security-reviewer"

[task_types]
accepts = ["cv", "cover letter", "write", "copywrite", "proposal", "tailored cv", "resume", "email draft", "pitch", "website copy", "ats", "humanizer"]
rejects = ["implement", "security audit", "database", "frontend", "mobile", "devops"]

[rate_limit]
notify_at_pct = 85
resume_queue  = true

[output]
deliverable_path = "output/"
report_path      = "reports/"
